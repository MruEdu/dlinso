<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>dlinso</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            background: #1a1625;
            color: #c4b8e0;
        }
        .screen {
            min-height: 100%;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
            background: radial-gradient(
                ellipse 80% 60% at 50% 40%,
                #2a2438 0%,
                #1a1625 70%
            );
        }
        .verse {
            max-width: 28rem;
            text-align: center;
        }
        h1 {
            font-size: clamp(1.05rem, 3.8vw, 1.3rem);
            font-weight: 500;
            color: #ece6f8;
            line-height: 1.65;
            margin-bottom: 1rem;
        }
        .sub {
            font-size: clamp(0.88rem, 2.8vw, 0.98rem);
            color: #b8b0cc;
            line-height: 1.75;
            margin-bottom: 1.25rem;
        }
        .guide {
            font-size: 0.88rem;
            color: #c9c0dc;
            line-height: 1.65;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(157, 142, 207, 0.22);
            background: rgba(255, 255, 255, 0.04);
        }
        .guide strong { color: #d4c8f0; }
    </style>
</head>
<body>
    <main class="screen">
        <div class="verse">
            <h1>대화로 발견하는 나의 보물, 예술이 되는 나의 삶. dlinso</h1>
            <p class="sub">
                당신의 일상이 작품이 되고, 당신의 강점이 빛나는 기록이 되는 곳.
                dlinso는 당신만의 이야기를 완성하는 대화형 성찰 플랫폼입니다.
            </p>
            <p class="guide">
                <strong>서사 구조화</strong> — 나눈 대화를 바탕으로 당신만의 이야기 결을 세웁니다.
            </p>
        </div>
    </main>
</body>
</html>
